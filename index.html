<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影子跟读练习器</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f1118;--surface:#1a1d2e;--surface2:#232740;--border:#2e3354;
    --text:#e8eaf0;--text2:#8b90a8;--accent:#6c9fff;
    --accent-glow:rgba(108,159,255,.15);--active:#ff9f6c;
    --active-glow:rgba(255,159,108,.2);--done:#6cffa8;--done-dim:rgba(108,255,168,.1);
  }
  body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
  .app{max-width:720px;margin:0 auto;padding:24px 16px 100px}
  header{text-align:center;margin-bottom:24px}
  header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--active));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  header p{color:var(--text2);font-size:12px;margin-top:4px}

  .status-box{padding:10px 14px;border-radius:10px;margin-bottom:16px;font-size:12px;text-align:center;border:1px solid var(--border)}
  .status-box.loading{background:#2a2520;color:#ffd76c;border-color:#5a4a20}
  .status-box.online{background:#1a2a1a;color:var(--done);border-color:#2a4a2a}
  .status-box.offline{background:#2a1a1a;color:#ff6c6c;border-color:#4a2a2a}

  .tts-toggle{display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:16px;border:1px solid var(--border)}
  .tts-toggle button{flex:1;padding:8px 10px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:.2s}
  .tts-toggle button.active{background:var(--accent);color:#0f1118}
  .tts-toggle button:disabled{opacity:.4;cursor:not-allowed}

  .input-area{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
  .input-area label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
  textarea{width:100%;min-height:130px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.8;padding:12px 14px;resize:vertical;outline:none}
  textarea:focus{border-color:var(--accent)}
  textarea::placeholder{color:#4a4f6a}

  .controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .control-group{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
  .control-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.6px}
  select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none}
  select option{background:var(--surface2);color:var(--text)}
  input[type="range"]{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--border);padding:0;border:none;margin-top:4px;outline:none}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer}
  .range-value{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);margin-top:4px}

  .actions{display:flex;gap:10px;margin-bottom:20px}
  .btn{flex:1;padding:13px 16px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary{background:var(--accent);color:#0f1118}
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
  .btn-stop{background:#ff4d6a;color:#fff}

  .sentences-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .sentences-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .sentences-header h3{font-size:14px;font-weight:600;color:var(--text2)}
  .progress-text{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent)}
  .sentences-list{padding:8px;max-height:450px;overflow-y:auto}
  .sentence-item{padding:12px 14px;border-radius:10px;margin-bottom:4px;font-size:15px;line-height:1.7;transition:.3s;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
  .sentence-item:hover{background:var(--surface2)}
  .sentence-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);min-width:22px;padding-top:3px;text-align:right}
  .sentence-text{flex:1}
  .sentence-item.active{background:var(--active-glow);border-left:3px solid var(--active)}
  .sentence-item.active .sentence-num{color:var(--active)}
  .sentence-item.done{background:var(--done-dim);opacity:.7}
  .sentence-item.done .sentence-num{color:var(--done)}
  .sentence-item.paused-at{background:rgba(108,159,255,.1);border-left:3px solid var(--accent)}
  .repeat-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:var(--accent-glow);padding:2px 8px;border-radius:6px;margin-left:auto;white-space:nowrap}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(26,29,46,.95);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:13px;color:var(--text2);backdrop-filter:blur(10px);z-index:10}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text2);flex-shrink:0}
  .dot.playing{background:var(--active);animation:pulse 1.2s infinite}
  .dot.waiting{background:var(--accent);animation:pulse 2s infinite}
  .dot.loading{background:#ffd76c;animation:pulse .6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .hidden{display:none!important}
  .sentences-list::-webkit-scrollbar{width:5px}
  .sentences-list::-webkit-scrollbar-track{background:transparent}
  .sentences-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🎧 影子跟读练习器</h1>
    <p>粘贴英文 → 逐句AI朗读 → 停顿跟读</p>
  </header>

  <div class="status-box loading" id="sBox">⏳ 正在连接在线AI语音...</div>

  <div class="tts-toggle">
    <button id="btnOnline" class="active" onclick="switchTTS('puter')">☁️ 在线AI语音</button>
    <button id="btnLocal" onclick="switchTTS('browser')">📱 本地语音(备用)</button>
  </div>

  <div class="input-area">
    <label>📝 粘贴你的英文文本</label>
    <textarea id="textInput" placeholder="从腾讯文档复制英文文本粘贴到这里...&#10;&#10;工具会自动按句拆分，逐句朗读并停顿等你跟读。"></textarea>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>语音 Voice</label>
      <select id="voiceSelect"></select>
    </div>
    <div class="control-group">
      <label>停顿 Pause (秒)</label>
      <input type="range" id="pauseRange" min="1" max="10" step="0.5" value="3">
      <div class="range-value" id="pauseValue">3.0s</div>
    </div>
    <div class="control-group">
      <label>每句重复 Repeat</label>
      <input type="range" id="repeatRange" min="1" max="5" step="1" value="1">
      <div class="range-value" id="repeatValue">1次</div>
    </div>
    <div class="control-group">
      <label>语速 Speed</label>
      <input type="range" id="speedRange" min="0.5" max="1.5" step="0.1" value="0.9">
      <div class="range-value" id="speedValue">0.9x</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="startBtn" onclick="startReading()">▶ 开始朗读</button>
    <button class="btn btn-secondary hidden" id="pauseBtn" onclick="togglePause()">⏸ 暂停</button>
    <button class="btn btn-stop hidden" id="stopBtn" onclick="stopReading()">⏹ 停止</button>
  </div>

  <div class="sentences-panel hidden" id="panel">
    <div class="sentences-header">
      <h3>句子列表</h3>
      <span class="progress-text" id="prog">0 / 0</span>
    </div>
    <div class="sentences-list" id="sList"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="dot" id="dot"></div>
  <span id="stxt">准备就绪</span>
</div>

<script>
// ========== STATE ==========
let S=[], ci=0, playing=false, paused=false, ptimer=null, cAudio=null, src='puter', puterOK=false;
const synth=window.speechSynthesis; let bVoices=[];

// ========== INIT PUTER ==========
(function checkPuter(){
  let tries=0;
  const iv=setInterval(()=>{
    tries++;
    if(typeof puter!=='undefined'&&puter.ai&&puter.ai.txt2speech){
      clearInterval(iv); puterOK=true;
      el('sBox').className='status-box online';
      el('sBox').textContent='✅ 在线AI语音已就绪（免费高质量）';
      fillVoices();
    }else if(tries>40){
      clearInterval(iv); puterOK=false;
      el('sBox').className='status-box offline';
      el('sBox').textContent='⚠️ 在线语音不可用，使用本地语音';
      switchTTS('browser');
    }
  },250);
})();

// ========== HELPERS ==========
function el(id){return document.getElementById(id)}

const PV=[
  {v:'Amy',l:'Amy (美式女声)'},{v:'Matthew',l:'Matthew (美式男声)'},
  {v:'Brian',l:'Brian (英式男声)'},{v:'Emma',l:'Emma (英式女声)'},
  {v:'Joanna',l:'Joanna (美式女声2)'},{v:'Joey',l:'Joey (美式男声2)'},
];

function fillVoices(){
  const s=el('voiceSelect'); s.innerHTML='';
  if(src==='puter'){
    PV.forEach(v=>{const o=document.createElement('option');o.value=v.v;o.textContent=v.l;s.appendChild(o)});
  }else{
    bVoices=synth.getVoices().filter(v=>v.lang.startsWith('en'));
    const pref=['Google','Microsoft','Samantha','Daniel'];
    bVoices.sort((a,b)=>(pref.some(p=>a.name.includes(p))?-1:1)-(pref.some(p=>b.name.includes(p))?-1:1));
    bVoices.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${v.name} (${v.lang})`;s.appendChild(o)});
  }
}
synth.onvoiceschanged=()=>{if(src==='browser')fillVoices()};

function switchTTS(t){
  if(t==='puter'&&!puterOK)return;
  src=t;
  el('btnOnline').classList.toggle('active',t==='puter');
  el('btnLocal').classList.toggle('active',t==='browser');
  fillVoices();
}

el('pauseRange').oninput=function(){el('pauseValue').textContent=parseFloat(this.value).toFixed(1)+'s'};
el('repeatRange').oninput=function(){el('repeatValue').textContent=this.value+'次'};
el('speedRange').oninput=function(){el('speedValue').textContent=this.value+'x'};

function splitS(t){return t.replace(/\n+/g,'\n').split(/(?<=[.!?])\s+|\n/).map(s=>s.trim()).filter(s=>s.length>0)}

function buildList(){
  const l=el('sList'); l.innerHTML='';
  S.forEach((s,i)=>{
    const d=document.createElement('div');d.className='sentence-item';d.id='s'+i;
    d.innerHTML=`<span class="sentence-num">${i+1}</span><span class="sentence-text">${s}</span>`;
    d.onclick=()=>jumpTo(i); l.appendChild(d);
  });
}
function upProg(){el('prog').textContent=`${ci+1} / ${S.length}`}
function setSt(t,c){el('stxt').textContent=t;const d=el('dot');d.className='dot';if(c)d.classList.add(c)}
function hiSent(i,st){
  document.querySelectorAll('.sentence-item').forEach(e=>e.classList.remove('active','paused-at'));
  const e=document.getElementById('s'+i);
  if(e){e.classList.add(st);e.scrollIntoView({behavior:'smooth',block:'center'})}
}
function markDone(i){const e=document.getElementById('s'+i);if(e)e.classList.add('done')}

// ========== SPEAK ==========
function speakPuter(text){
  return new Promise(async(res)=>{
    try{
      const v=el('voiceSelect').value;
      const audio=await puter.ai.txt2speech(text,{voice:v,engine:'neural',language:'en-US'});
      cAudio=audio;
      audio.playbackRate=parseFloat(el('speedRange').value);
      audio.onended=()=>{cAudio=null;res()};
      audio.onerror=(e)=>{console.error('audio error',e);cAudio=null;res()};
      audio.play().catch(e=>{console.error('play error',e);cAudio=null;res()});
    }catch(e){
      console.error('Puter TTS err:',e);cAudio=null;
      await speakLocal(text); res();
    }
  });
}

function speakLocal(text){
  return new Promise((res)=>{
    synth.cancel();
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(text);
      const idx=el('voiceSelect').value;
      if(bVoices[idx])u.voice=bVoices[idx];
      u.rate=parseFloat(el('speedRange').value);u.pitch=1;
      u.onend=()=>res();u.onerror=()=>res();
      synth.speak(u);
    },100);
  });
}

function speak(t){return(src==='puter'&&puterOK)?speakPuter(t):speakLocal(t)}
function wait(s){return new Promise(r=>{ptimer=setTimeout(r,s*1000)})}

// ========== MAIN LOOP ==========
async function loop(){
  const pd=parseFloat(el('pauseRange').value), rc=parseInt(el('repeatRange').value);
  while(ci<S.length&&playing){
    while(paused&&playing)await new Promise(r=>setTimeout(r,200));
    if(!playing)break;
    for(let rep=0;rep<rc&&playing;rep++){
      while(paused&&playing)await new Promise(r=>setTimeout(r,200));
      if(!playing)break;

      document.querySelectorAll('.repeat-badge').forEach(b=>b.remove());
      if(rc>1){const e=document.getElementById('s'+ci);if(e){const b=document.createElement('span');b.className='repeat-badge';b.textContent=`${rep+1}/${rc}`;e.appendChild(b)}}

      hiSent(ci,'active');
      setSt(`朗读第${ci+1}句${rc>1?`（第${rep+1}遍）`:''}`,'loading');
      upProg();
      await speak(S[ci]);
      if(!playing)break;

      hiSent(ci,'paused-at');
      setSt('⏳ 请跟读这句','waiting');
      await wait(pd);
      if(!playing)break;
    }
    if(!playing)break;
    document.querySelectorAll('.repeat-badge').forEach(b=>b.remove());
    markDone(ci); ci++;
  }
  if(playing&&ci>=S.length){setSt('✅ 全部完成！','');finish()}
}

// ========== CONTROLS ==========
function startReading(){
  const t=el('textInput').value.trim();if(!t)return;
  S=splitS(t);if(!S.length)return;
  ci=0;playing=true;paused=false;
  buildList();
  el('panel').classList.remove('hidden');
  el('startBtn').classList.add('hidden');
  el('pauseBtn').classList.remove('hidden');
  el('stopBtn').classList.remove('hidden');
  loop();
}
function togglePause(){
  paused=!paused;
  if(paused){
    if(cAudio)cAudio.pause();if(src==='browser')synth.pause();
    el('pauseBtn').textContent='▶ 继续';setSt('已暂停','');
    if(ptimer)clearTimeout(ptimer);
  }else{
    if(cAudio)cAudio.play();if(src==='browser')synth.resume();
    el('pauseBtn').textContent='⏸ 暂停';
  }
}
function stopReading(){
  playing=false;paused=false;
  if(cAudio){cAudio.pause();cAudio=null}
  synth.cancel();if(ptimer)clearTimeout(ptimer);
  finish();setSt('已停止','');
}
function finish(){
  el('startBtn').classList.remove('hidden');el('startBtn').textContent='▶ 重新开始';
  el('pauseBtn').classList.add('hidden');el('stopBtn').classList.add('hidden');
  el('pauseBtn').textContent='⏸ 暂停';
}
function jumpTo(i){
  if(!playing)return;
  if(cAudio){cAudio.pause();cAudio=null}
  synth.cancel();if(ptimer)clearTimeout(ptimer);ci=i;
  for(let j=i;j<S.length;j++){const e=document.getElementById('s'+j);if(e)e.classList.remove('done')}
}

fillVoices();
</script>
</body>
</html>
